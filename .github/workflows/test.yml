# .github/workflows/test.yml
#
# Runs the streamcraft test suite on every push and pull request.
#
# IMPORTANT — why this workflow does not use setup-python:
#
# streamcraft depends on GStreamer's Python bindings (python3-gi), which are
# installed by apt into the *system* Python's site-packages. GitHub's
# setup-python action installs a completely separate, isolated Python into
# /opt/hostedtoolcache/ that has no access to system site-packages. These two
# Python installations don't know about each other, so `import gi` would fail
# even after `apt install python3-gi`.
#
# The correct approach for a library that requires system packages is to use
# the system Python directly. This also reflects how users actually run the
# library — on Raspberry Pi OS, Ubuntu, or Debian, always with the system
# Python and system GStreamer bindings.
#
# Hardware-dependent tests (@pytest.mark.hardware) are never run in CI.
# pytest.ini already excludes them with: addopts = -m "not hardware"

name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: "Ubuntu latest / system Python"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Check out code
        uses: actions/checkout@v4

      # ── 2. Install GStreamer and its Python bindings via apt ────────────────
      # python3-gi and the gir typelibs go into the system Python's
      # site-packages, which is exactly where the system Python will find them.
      - name: Install GStreamer system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi \
            python3-pip \
            gir1.2-gstreamer-1.0 \
            gir1.2-gst-plugins-base-1.0 \
            gir1.2-gst-plugins-bad-1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools \
            gstreamer1.0-alsa \
            v4l-utils \
            xvfb

      # ── 3. Install streamcraft and pytest into the system Python ────────────
      # We use --break-system-packages here intentionally: this is a disposable
      # CI container that is destroyed after the job, so there is no risk of
      # conflicts with other system packages persisting anywhere.
      - name: Install streamcraft and test dependencies
        run: |
          python3 -m pip install --break-system-packages -e ".[aiohttp]"
          python3 -m pip install --break-system-packages pytest

      # ── 4. Verify that `import gi` works before running tests ───────────────
      # This step makes CI failures easier to diagnose: if the GStreamer
      # bindings are not accessible, this step fails with a clear message
      # rather than a confusing error buried in pytest output.
      - name: Verify GStreamer Python bindings are accessible
        run: |
          python3 -c "import gi; gi.require_version('Gst', '1.0'); from gi.repository import Gst; Gst.init(None); print('✓ GStreamer bindings OK')"

      # ── 5. Run the test suite ───────────────────────────────────────────────
      # xvfb-run provides a virtual display so GStreamer elements that need
      # a display (autovideosink etc.) don't fail in the headless CI environment.
      - name: Run tests
        run: xvfb-run python3 -m pytest --tb=short

      # ── 6. Upload test results on failure ──────────────────────────────────
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7